name: Build OnePlus SM8845 Kernel
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo files
        uses: actions/checkout@v4

      - name: Install GCC‑11 cross‑compiler
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y aarch64-linux-gnu-gcc-11 aarch64-linux-gnu-g++-11
          # 建立软链接，适配内核CROSS_COMPILE格式
          mkdir -p gcc/bin
          ln -s /usr/bin/aarch64-linux-gnu-gcc-11 gcc/bin/aarch64-linux-android-gcc
          ln -s /usr/bin/aarch64-linux-gnu-g++-11 gcc/bin/aarch64-linux-android-g++

      - name: Clone kernel source repositories
        run: |
          git clone https://github.com/fgnb666ace2vuser/android_kernel_common_oneplus_sm8845 kernel
          git clone https://github.com/fgnb666ace2vuser/android_kernel_modules_and_devicetree_oneplus_sm8845 temp1
          git clone https://github.com/fgnb666ace2vuser/android_kernel_oneplus_sm8845 temp2

          cp -nR temp1/* kernel/
          cp -nR temp2/* kernel/

          rm -rf temp1 temp2

      - name: Copy custom config and CPU module folder
        run: |
          cp .config kernel/
          cp -r CPU kernel/

      - name: Compile kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: ${{github.workspace}}/gcc/bin/aarch64-linux-android-
        run: |
          cd kernel
          make olddefconfig
          make -j$(nproc)
          make modules
          cp arch/arm64/boot/Image ../Kernel-Image
          find . -name "*.ko" -exec cp {} ../spoof-cpu.ko \;

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel‑Build‑Output
          path: |
            Kernel-Image
            spoof-cpu.ko
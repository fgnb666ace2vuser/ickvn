name: Build OnePlus SM8845 Kernel
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo files
        uses: actions/checkout@v4

      - name: Clone kernel source repositories
        run: |
          git clone https://github.com/fgnb666ace2vuser/android_kernel_common_oneplus_sm8845 kernel
          git clone https://github.com/fgnb666ace2vuser/android_kernel_modules_and_devicetree_oneplus_sm8845 temp1
          git clone https://github.com/fgnb666ace2vuser/android_kernel_oneplus_sm8845 temp2

          cp -nR temp1/* kernel/
          cp -nR temp2/* kernel/

          rm -rf temp1 temp2

      - name: Copy custom config and CPU module folder
        run: |
          cp .config kernel/
          cp -r CPU kernel/

      # 使用稳定的预编译GCC‑4.9从GitHub镜像，改用curl下载压缩包
      - name: Download GCC‑4.9 from GitHub mirror
        run: |
          curl -L "https://github.com/zhuwendong/android_prebuilts_gcc_linux-x86_aarch64-linux-android-4.9/releases/download/v4.9/gcc49.zip" -o gcc49.zip
          unzip -q gcc49.zip

      - name: Compile kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: ${{github.workspace}}/android_prebuilts_gcc_linux-x86_aarch64-linux-android-4.9/bin/aarch64-linux-android-
        run: |
          cd kernel
          make -j$(nproc)
          make modules
          cp arch/arm64/boot/Image ../Kernel-Image
          find . -name "*.ko" -exec cp {} ../spoof-cpu.ko \;

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel‑Build‑Output
          path: |
            Kernel-Image
            spoof-cpu.ko
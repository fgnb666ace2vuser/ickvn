name: Build OnePlus SM8845 Kernel
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo files
        uses: actions/checkout@v4

      - name: Cache GCC‑7.5
        uses: actions/cache@v3
        with:
          path: gcc-arm64
          key: gcc75‑aarch64‑android

      - name: Download GCC‑7.5 prebuilt
        run: |
          if [ ! -d "gcc-arm64" ]; then
            wget https://github.com/arter97/arm64-gcc/releases/download/7.5/aarch64-linux-android-7.5-linux-x86_64.tar.xz
            tar -xf aarch64-linux-android-7.5-linux-x86_64.tar.xz -C gcc-arm64 --strip-components=1
          fi

      - name: Clone kernel source repositories
        run: |
          git clone https://github.com/fgnb666ace2vuser/android_kernel_common_oneplus_sm8845 kernel
          git clone https://github.com/fgnb666ace2vuser/android_kernel_modules_and_devicetree_oneplus_sm8845 temp1
          git clone https://github.com/fgnb666ace2vuser/android_kernel_oneplus_sm8845 temp2

          cp -nR temp1/* kernel/
          cp -nR temp2/* kernel/

          rm -rf temp1 temp2

      - name: Copy custom config and CPU module folder
        run: |
          cp .config kernel/
          cp -r CPU kernel/

      - name: Compile kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: ${{github.workspace}}/gcc-arm64/bin/aarch64-linux-android-
        run: |
          cd kernel
          make olddefconfig
          make -j$(nproc)
          make modules
          cp arch/arm64/boot/Image ../Kernel-Image
          find . -name "*.ko" -exec cp {} ../spoof-cpu.ko \;

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel‑Build‑Output
          path: |
            Kernel-Image
            spoof-cpu.ko
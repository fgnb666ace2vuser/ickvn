name: Build OnePlus SM8845 Kernel
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo files
        uses: actions/checkout@v4

      - name: Clone kernel source repositories
        run: |
          git clone https://github.com/fgnb666ace2vuser/android_kernel_common_oneplus_sm8845 kernel
          git clone https://github.com/fgnb666ace2vuser/android_kernel_modules_and_devicetree_oneplus_sm8845 temp1
          git clone https://github.com/fgnb666ace2vuser/android_kernel_oneplus_sm8845 temp2

          cp -nR temp1/* kernel/
          cp -nR temp2/* kernel/

          rm -rf temp1 temp2

      - name: Copy custom config and CPU module folder
        run: |
          cp .config kernel/
          cp -r CPU kernel/

      # 直接安装安卓版GCC‑4.9交叉编译器
      - name: Install GCC‑4.9 from apt
        run: |
          sudo apt‑get update
          sudo apt‑get install -y gcc‑4.9‑aarch64‑linux‑gnu g++‑4.9‑aarch64‑linux‑gnu
          ln -s /usr/bin/aarch64‑linux‑gnu‑gcc‑4.9 ${{github.workspace}}/gcc-arm64/bin/aarch64-linux-android-gcc
          ln -s /usr/bin/aarch64‑linux‑gnu‑g++‑4.9 ${{github.workspace}}/gcc-arm64/bin/aarch64-linux-android-g++
          mkdir -p gcc-arm64/bin

      - name: Compile kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: ${{github.workspace}}/gcc-arm64/bin/aarch64-linux-android-
        run: |
          cd kernel
          make -j$(nproc)
          make modules
          cp arch/arm64/boot/Image ../Kernel-Image
          find . -name "*.ko" -exec cp {} ../spoof-cpu.ko \;

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel‑Build‑Output
          path: |
            Kernel-Image
            spoof-cpu.ko
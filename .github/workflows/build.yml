name: Build Kernel Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FULL_VER: ""
      LOCAL_VER: ""
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu git bc bison flex libssl-dev libelf-dev lz4 perl python3 binutils wget

      - name: 下载独立版 magiskboot‑linux（增加‑L跟随302重定向）
        run: |
          wget -L https://github.com/topjohnwu/Magisk/releases/latest/download/magiskboot-linux
          chmod +x magiskboot-linux
          mv magiskboot-linux magiskboot

      - name: 解包 init_boot.img，提取内核
        run: |
          ./magiskboot unpack init_boot.img kernel.raw
          ./magiskboot decompress kernel.raw vmlinux
          ls -lh vmlinux

      - name: 提取内核版本并写入全局环境变量
        run: |
          FULL_VER=$(strings vmlinux | grep "Linux version" | head -1 | awk '{print $3}')
          echo "FULL_VER=${FULL_VER}" >> $GITHUB_ENV
          if [[ "${FULL_VER}" == *"-"* ]]; then
            LOCAL_VER="-${FULL_VER#*-}"
          else
            LOCAL_VER=""
          fi
          echo "LOCAL_VER=${LOCAL_VER}" >> $GITHUB_ENV
          echo "完整内核版本: ${FULL_VER}"
          echo "LOCALVERSION: ${LOCAL_VER}"

      - name: 生成Python脚本提取Module.symvers
        run: |
          cat > extract_symvers.py << 'PYEOF'
          import sys, struct, subprocess, re

          def get_sections(path):
              out = subprocess.run(['readelf', '-S', path], capture_output=True, text=True).stdout
              secs = {}
              pat = re.compile(r'\[\s*\d+\]\s+(\S+)\s+\S+\s+([0-9a-f]+)\s+([0-9a-f]+)\s+([0-9a-f]+)')
              for line in out.split('\n'):
                  m = pat.search(line)
                  if m:
                      secs[m.group(1)] = {
                          'addr': int(m.group(2), 16),
                          'offset': int(m.group(3), 16),
                          'size': int(m.group(4), 16)
                      }
              return secs

          def main():
              if len(sys.argv) != 3:
                  sys.exit(1)
              vmlinux_path = sys.argv[1]
              out_path = sys.argv[2]
              secs = get_sections(vmlinux_path)
              if "__ksymtab_strings" not in secs:
                  sys.exit(2)
              str_sec = secs['__ksymtab_strings']
              with open(vmlinux_path, "rb") as f:
                  data = f.read()
              str_data = data[str_sec['offset']:str_sec['offset'] + str_sec['size']]
              ksym_pairs = []
              for sec_name in secs:
                  if sec_name.startswith("__ksymtab") and sec_name != "__ksymtab_strings":
                      crc_sec = sec_name.replace("__ksymtab", "__kcrctab")
                      if crc_sec in secs:
                          ksym_pairs.append((sec_name, crc_sec))
              if not ksym_pairs:
                  sys.exit(3)
              # 获取内核版本
              kver = "6.12.35"
              try:
                  ret = subprocess.run(["strings", vmlinux_path], capture_output=True, text=True)
                  for line in ret.stdout.splitlines():
                      if "Linux version" in line:
                          kver = line.split()[2]
                          break
              except Exception:
                  pass
              with open(out_path, "w", encoding="utf‑8") as f_out:
                  for ks_name, kc_name in ksym_pairs:
                      ks = secs[ks_name]
                      kc = secs[kc_name]
                      ks_data = data[ks['offset']: ks['offset'] + ks['size']]
                      kc_data = data[kc['offset']: kc['offset'] + kc['size']]
                      count_sym = ks['size'] // 8
                      count_crc = kc['size'] // 4
                      if count_sym != count_crc:
                          continue
                      for i in range(count_sym):
                          off_name, off_ns = struct.unpack('<ii', ks_data[i*8:i*8+8])
                          crc_val = struct.unpack('<I', kc_data[i*4:i*4+4])[0]
                          sym_vaddr = ks['addr'] + (i * 8)
                          name_vaddr = sym_vaddr + off_name
                          str_offset = name_vaddr - str_sec['addr']
                          if 0 <= str_offset < len(str_data):
                              null_pos = str_data.find(b'\x00', str_offset)
                              if null_pos == -1:
                                  sym_name = str_data[str_offset:].decode("utf-8", errors="replace")
                              else:
                                  sym_name = str_data[str_offset:null_pos].decode("utf-8", errors="replace")
                              if sym_name:
                                  f_out.write(f"0x{crc_val:08x}\t{sym_name}\t{kver}\t\n")

          if __name__ == "__main__":
              main()
          PYEOF
          python3 extract_symvers.py vmlinux Module.symvers
          test -f Module.symvers
          echo "提取符号条目数量：$(wc -l < Module.symvers)"

      - name: 拉取内核源码，编译环境准备
        run: |
          git clone --depth=1 -b android16-6.12 https://android.googlesource.com/kernel/common/ kernel
          cd kernel
          make defconfig ARCH=arm64
          # 写入LOCALVERSION
          echo "CONFIG_LOCALVERSION=\"${{ env.LOCAL_VER }}\"" >> .config
          echo '# CONFIG_LOCALVERSION_AUTO is not set' >> .config
          echo 'CONFIG_MODVERSIONS=y' >> .config
          echo 'CONFIG_MODULE_SRCVERSION_ALL=y' >> .config
          make modules_prepare ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
          cp ../Module.symvers .

      - name: 编译内核模块
        run: |
          export KERNEL_DIR="$PWD/kernel"
          export KBUILD_NOPEDANTIC=1
          make -C $KERNEL_DIR M=$PWD modules

      - name: 校验编译结果
        run: |
          modinfo hw_drv.ko
      - uses: actions/upload-artifact@v4
        with:
          name: hw_drv_ko
          path: hw_drv.ko
name: Build OnePlus SM8845 Kernel
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo files
        uses: actions/checkout@v4

      - name: Cache NDK‑r16b
        uses: actions/cache@v3
        with:
          path: android-ndk-r16b
          key: ndk-r16b

      - name: Download Android NDK‑r16b (GCC‑4.9)
        run: |
          if [ ! -d "android-ndk-r16b" ]; then
            wget https://dl.google.com/android/repository/android-ndk-r16b-linux-x86_64.zip
            unzip -q android-ndk-r16b-linux-x86_64.zip
          fi

      - name: Clone kernel source repositories
        run: |
          git clone https://github.com/fgnb666ace2vuser/android_kernel_common_oneplus_sm8845 kernel
          git clone https://github.com/fgnb666ace2vuser/android_kernel_modules_and_devicetree_oneplus_sm8845 temp1
          git clone https://github.com/fgnb666ace2vuser/android_kernel_oneplus_sm8845 temp2

          cp -nR temp1/* kernel/
          cp -nR temp2/* kernel/

          rm -rf temp1 temp2

      - name: Copy custom config and CPU module folder
        run: |
          cp .config kernel/
          cp -r CPU kernel/

      - name: Compile kernel
        env:
          ARCH: arm64
          CROSS_COMPILE: ${{github.workspace}}/android-ndk-r16b/toolchains/aarch64-linux-android-4.9/prebuilt/linux-x86_64/bin/aarch64-linux-android-
        run: |
          cd kernel
          sed -i '/if [ "\${GCC_VERSION}" -lt 510 ];/,/fi/d' scripts/Kconfig.include
          IGNORE_GCC_VERSION_CHECK=1 make olddefconfig
          make -j$(nproc)
          make modules
          cp arch/arm64/boot/Image ../Kernel-Image
          find . -name "*.ko" -exec cp {} ../spoof-cpu.ko \;

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel‑Build‑Output
          path: |
            Kernel-Image
            spoof-cpu.ko
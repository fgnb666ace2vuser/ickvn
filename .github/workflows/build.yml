- name: 从 init_boot.img 提取内核并解压
  run: |
    set -euo pipefail
    # 用 python 安全读取两个关键字段（避免 shell 小端转换的坑）
    read KERNEL_SIZE PAGE_SIZE <<< $(python3 -c "
import struct
with open('init_boot.img', 'rb') as f:
    f.seek(8)
    kernel_size = struct.unpack('<I', f.read(4))[0]
    f.seek(36)
    page_size = struct.unpack('<I', f.read(4))[0]
    print(kernel_size, page_size)
")
    echo "kernel_size = ${KERNEL_SIZE}"
    echo "page_size   = ${PAGE_SIZE}"
    # 提取内核数据
    dd if=init_boot.img of=kernel.img bs=1 skip=${PAGE_SIZE} count=${KERNEL_SIZE}
    # 尝试 lz4 解压（常见于较新 GKI 内核），失败则可能是未压缩或其他格式，直接重命名
    if lz4 -d kernel.img vmlinux 2>/dev/null; then
        echo "lz4 解压成功"
    else
        echo "不是 lz4 压缩，可能为未压缩内核或其他格式，直接复制"
        cp kernel.img vmlinux
    fi
    test -f vmlinux
    file vmlinux
    ls -lh vmlinux